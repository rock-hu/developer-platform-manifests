name: manifests-users
on:
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/manifests-users.yaml"
      - "manifests/users/**"
jobs:
  validate-entity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # - run: npm install --force --verbose
      - run: yarn install
      - run: yarn manifests-users