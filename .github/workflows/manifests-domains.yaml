name: manifests-domains
on:
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/manifests-domains.yaml"
      - "manifests/domains/**"
jobs:
  validate-entity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install -g @roadiehq/backstage-entity-validator
      - run: yarn install
      - run: yarn run validate-entity:manifests-domains