      $ref: ../components/responses/429Error.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
  requestBody:
    content:
      application/json; charset=utf-8:
        schema:
          $ref: ../components/schemas/OBDomesticVRPConsentRequest.yaml
      application/json:
