type: object
required:
  - Data
properties:
  Data:
    type: object
    required:
      - PaymentTransactionId
      - Status
      - StatusUpdateDateTime
    properties:
      PaymentTransactionId:
        type: string
        minLength: 1
        maxLength: 210
        description: |-
          Unique identifier for the transaction within an servicing
                institution. This identifier is both unique and immutable.
      Status:
        type: string
        description: |-
          Status of a transfer, as assigned by the transaction
                administrator.
        enum:
          - RCVD
          - RJCT
          - CANC
          - PDNG
          - ACTC
          - ACCP
          - ACFC
          - ACSP
          - ACWC
          - ACSC
          - ACWP
          - ACCC
          - BLCK
      StatusUpdateDateTime:
        type: string
        format: date-time
        description: |
          Date and time at which the status was assigned to the
                transfer.
      LocalInstrument:
        $ref: ./OBInternalLocalInstrument1Code.yaml
      StausDetail:
        type: array
        items:
          type: object
          required:
            - Status
          properties:
            Status:
              description: |-
                Status of a transfer, as assigned by the transaction
                    administrator.
              type: string
              minLength: 1
              maxLength: 4
              enum:
                - RCVD
                - RJCT
                - CANC
                - PDNG
                - ACTC
                - ACCP
                - ACFC
                - ACSP
                - ACWC
                - ACSC
                - ACWP
                - ACCC
                - BLCK
            StatusReasonCode:
              description: >-
                Reason Code provided for the status of a transfer. For a full
                description see `OBExternalStatusReason1Code`
                [here](https://github.com/OpenBankingUK/External_Internal_CodeSets)
              type: string
              minLength: 1
              maxLength: 4
            StatusReasonDescription:
              description: Reason provided for the status of a transfer.
              type: string
              minLength: 1
              maxLength: 500
            StatusUpdateDateTime:
              type: string
              format: date-time
              description: |
                Date and time at which the status was assigned to the transfer.
