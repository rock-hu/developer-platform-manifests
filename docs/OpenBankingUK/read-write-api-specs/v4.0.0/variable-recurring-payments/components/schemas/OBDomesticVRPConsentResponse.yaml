type: object
required:
  - Data
  - Risk
  - Links
  - Meta
properties:
  Data:
    type: object
    required:
      - ConsentId
      - CreationDateTime
      - Status
      - StatusUpdateDateTime
      - ControlParameters
      - Initiation
    properties:
      ReadRefundAccount:
        type: string
        enum:
          - 'Yes'
          - 'No'
        description: >
          Indicates whether information about RefundAccount should be included
          in the payment response.
      ConsentId:
        type: string
        minLength: 1
        maxLength: 128
        description: >
          Unique identification as assigned by the ASPSP to uniquely identify
          the consent resource.
      CreationDateTime:
        type: string
        format: date-time
        description: |
          Date and time at which the resource was created.
      Status:
        description: >-
          Specifies the status of consent resource in code form. AWAU and RJCT
          only can returned on initial submission
        type: string
        enum:
          - AWAU
          - RJCT
          - AUTH
          - CANC
          - EXPD
      StatusReason:
        type: array
        items:
          $ref: ./OBStatusReason.yaml
      StatusUpdateDateTime:
        type: string
        format: date-time
        description: |
          Date and time at which the resource status was updated.
      ControlParameters:
        $ref: ./OBDomesticVRPControlParameters.yaml
      Initiation:
        $ref: ./OBDomesticVRPInitiation.yaml
      DebtorAccount:
        allOf:
          - $ref: ./OBCashAccountDebtorWithName.yaml
          - description: >-
              The value must be populated for GET responses once the consent is
              approved.
  Risk:
    $ref: ./OBRisk1.yaml
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
