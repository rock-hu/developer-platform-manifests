type: object
description: >-
  Information supplied to enable the matching of an entry with the items that
  the transfer is intended to settle, such as commercial invoices in an
  accounts' receivable system.
properties:
  Code:
    $ref: ./ExternalDocumentType1Code.yaml
  Issuer:
    type: string
    maxLength: 140
    minLength: 1
  Number:
    type: string
    maxLength: 140
    minLength: 1
  RelatedDate:
    $ref: ./ISODateTime.yaml
  LineDetails:
    type: array
    items:
      type: string
      maxLength: 256
      minLength: 1
