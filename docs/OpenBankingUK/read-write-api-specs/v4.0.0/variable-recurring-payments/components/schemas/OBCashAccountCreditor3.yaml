type: object
required:
  - SchemeName
  - Identification
  - Name
properties:
  SchemeName:
    $ref: ./OBInternalAccountIdentification4Code.yaml
  Identification:
    type: string
    minLength: 1
    maxLength: 256
    description: >-
      Identification assigned by an institution to identify an account. This
      identification is known by the account owner.
  Name:
    type: string
    minLength: 1
    maxLength: 350
    description: >-
      Name of the account, as assigned by the account servicing institution.

      Usage: the account name is the name or names of the account owner(s)
      represented at an account level.

      The account name is not the product name or the nickname of the account.
  SecondaryIdentification:
    type: string
    minLength: 1
    maxLength: 34
    description: >-
      This is secondary identification of the account, as assigned by the
      account servicing institution.

      This can be used by building societies to additionally identify accounts
      with a roll number (in addition to a sort code and account number
      combination)
  Proxy:
    $ref: ./OBProxy1.yaml
