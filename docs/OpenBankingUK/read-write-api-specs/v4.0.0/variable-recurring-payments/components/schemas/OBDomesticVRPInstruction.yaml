type: object
required:
  - InstructionIdentification
  - EndToEndIdentification
  - InstructedAmount
  - CreditorAccount
properties:
  InstructionIdentification:
    type: string
    minLength: 1
    maxLength: 35
    description: >-
      Unique identification as assigned by an instructing party for an
      instructed party to unambiguously identify the instruction.

      Usage: the instruction identification is a point to point reference that
      can be used between the instructing party and the instructed party to
      refer to the individual instruction.

      It can be included in several messages related to the instruction.
  EndToEndIdentification:
    type: string
    minLength: 1
    maxLength: 35
    description: >-
      Unique identification assigned by the initiating party to unambiguously
      identify the transaction.

      This identification is passed on, unchanged, throughout the entire
      end-to-end chain.

      Usage: The end-to-end identification can be used for reconciliation or to
      link tasks relating to the transaction.

      It can be included in several messages related to the transaction.

      OB: The Faster Payments Scheme can only access 31 characters for the
      EndToEndIdentification field
  RemittanceInformation:
    $ref: ./OBRemittanceInformation2.yaml
  LocalInstrument:
    $ref: ./OBInternalLocalInstrument1Code.yaml
  InstructedAmount:
    $ref: ./OBActiveOrHistoricCurrencyAndAmount.yaml
  CreditorPostalAddress:
    $ref: ./OBPostalAddress7.yaml
  CreditorAccount:
    $ref: ./OBCashAccountCreditor3.yaml
  UltimateCreditor:
    $ref: ./OBUltimateCreditor1.yaml
  SupplementaryData:
    type: object
    description: >
      Additional information that can not be captured in the structured fields
      and/or any other specific block.
