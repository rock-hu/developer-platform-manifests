type: object
additionalProperties: false
properties:
  PaymentContextCode:
    type: string
    description: |
      Specifies the payment context, `OBInternalPaymentContext1Code`
    enum:
      - BillingGoodsAndServicesInAdvance
      - BillingGoodsAndServicesInArrears
      - EcommerceMerchantInitiatedPayment
      - FaceToFacePointOfSale
      - TransferToSelf
      - TransferToThirdParty
  MerchantCategoryCode:
    type: string
    minLength: 3
    maxLength: 4
    description: >-
      Category code conform to ISO 18245, related to the type of services or
      goods the merchant provides for the transaction.
  MerchantCustomerIdentification:
    type: string
    minLength: 1
    maxLength: 70
    description: The unique customer identifier of the PSU with the merchant.
  ContractPresentIndicator:
    type: boolean
    description: Indicates if Payee has a contractual relationship with the PISP.
  BeneficiaryPrepopulatedIndicator:
    type: boolean
    description: >-
      Indicates if PISP has immutably prepopulated payment details in for the
      PSU.
  PaymentPurposeCode:
    $ref: ./OBExternalPurpose1Code.yaml
  CategoryPurposeCode:
    $ref: ./ExternalCategoryPurpose1Code.yaml
  BeneficiaryAccountType:
    $ref: ./OBInternalExtendedAccountType1Code.yaml
  DeliveryAddress:
    $ref: ./OBPostalAddress7.yaml
description: |-
  The Risk section is sent by the initiating party to the ASPSP.
  It is used to specify additional details for risk scoring for Payments.
