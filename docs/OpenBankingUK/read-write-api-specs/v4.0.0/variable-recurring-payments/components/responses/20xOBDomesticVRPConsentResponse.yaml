description: Default response
headers:
  x-fapi-interaction-id:
    description: An RFC4122 UID used as a correlation id.
    required: true
    schema:
      type: string
  x-jws-signature:
    description: Header containing a detached JWS signature of the body of the payload.
    required: true
    schema:
      type: string
  payload-version:
    description: >-
      Optional header to aid migration across API versions.  Indicates the
      version of JSON schema being sent/received
    schema:
      type: string
      example: 3.1.11
content:
  application/json; charset=utf-8:
    schema:
      $ref: ../schemas/OBDomesticVRPConsentResponse.yaml
  application/json:
    schema:
      $ref: ../schemas/OBDomesticVRPConsentResponse.yaml
  application/jose+jwe:
    schema:
      $ref: ../schemas/OBDomesticVRPConsentResponse.yaml
