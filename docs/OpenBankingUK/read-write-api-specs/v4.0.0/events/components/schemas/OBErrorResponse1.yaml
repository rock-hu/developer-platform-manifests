description: >-
  An array of detail error codes, and messages, and URLs to documentation to
  help remediation.
type: object
properties:
  Id:
    description: >-
      A unique reference for the error instance, for audit purposes, in case of
      unknown/unclassified errors.
    type: string
    minLength: 1
    maxLength: 40
  Code:
    description: >-
      Deprecated <br>High level textual error code, to help categorise the
      errors.
    type: string
    minLength: 1
    example: 400 BadRequest
    maxLength: 40
  Message:
    description: Deprecated <br>Brief Error message
    type: string
    minLength: 1
    example: There is something wrong with the request parameters provided
    maxLength: 500
  Errors:
    items:
      $ref: ./OBError1.yaml
    type: array
    minItems: 1
required:
  - Errors
additionalProperties: false
