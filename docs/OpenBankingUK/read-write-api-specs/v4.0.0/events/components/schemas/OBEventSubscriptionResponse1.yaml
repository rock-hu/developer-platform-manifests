type: object
required:
  - Data
properties:
  Data:
    type: object
    required:
      - EventSubscriptionId
      - Version
    properties:
      EventSubscriptionId:
        description: >-
          Unique identification as assigned by the ASPSP to uniquely identify
          the callback URL resource.
        type: string
        minLength: 1
        maxLength: 40
      CallbackUrl:
        description: >-
          Callback URL for a TPP hosted service. Will be used by ASPSPs, in
          conjunction with the resource name, to construct a URL to send event
          notifications to.
        type: string
        format: uri
      Version:
        $ref: ./Version.yaml
      EventTypes:
        type: array
        items:
          description: Array of event types the subscription applies to.
          type: string
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
additionalProperties: false
