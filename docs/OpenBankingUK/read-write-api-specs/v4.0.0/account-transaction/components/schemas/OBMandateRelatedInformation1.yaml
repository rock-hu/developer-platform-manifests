type: object
description: >-
  Provides further details of the mandate signed between the creditor and the
  debtor.
required:
  - Frequency
properties:
  MandateIdentification:
    description: >-
      Unique identification, as assigned by the creditor, to unambiguously
      identify the mandate.
    type: string
    example: Golfers
    minLength: 1
    maxLength: 35
  Classification:
    $ref: ./OBExternalMandateClassification1Code.yaml
  CategoryPurposeCode:
    $ref: ./ExternalCategoryPurpose1Code.yaml
  FirstPaymentDateTime:
    description: >-
      The date on which the first payment for a recurrent credit transfer will
      be made.
    example: '2024-04-25T12:46:49.425Z'
    type: string
    format: date-time
  RecurringPaymentDateTime:
    description: >-
      The date on which the first recurring payment for a Standing Order
      schedule will be made. 

      Usage: This must be populated only if the first recurring date is
      different to the first payment date.All dates in the JSON payloads are
      represented in ISO 8601 date-time format. 

      All date-time fields in responses must include the timezone. An example is
      below:

      2017-04-05T10:43:07+00:00
    type: string
    example: '2024-04-25T12:46:49.425Z'
    format: date-time
  FinalPaymentDateTime:
    description: >-
      The date on which the final payment for a recurrent credit transfer will
      be made.
    type: string
    example: '2024-04-25T12:46:49.425Z'
    format: date-time
  Frequency:
    $ref: ./OBFrequency6.yaml
  Reason:
    description: Reason for the setup of the credit transfer mandate.
    type: string
    example: To pay monthly memebership
    maxLength: 256
    minLength: 1
