type: object
required:
  - Data
  - Risk
properties:
  Data:
    type: object
    required:
      - ConsentId
      - CreationDateTime
      - Status
      - StatusUpdateDateTime
      - Permissions
    properties:
      ConsentId:
        description: >-
          Unique identification as assigned to identify the account access
          consent resource.
        type: string
        minLength: 1
        maxLength: 128
      CreationDateTime:
        $ref: ./CreationDateTime.yaml
      Status:
        description: Specifies the status of consent resource in code form.
        type: string
        enum:
          - AWAU
          - RJCT
          - AUTH
          - EXPD
          - CANC
      StatusReason:
        type: array
        items:
          $ref: ./OBStatusReason.yaml
        description: Specifies the status reason.
      StatusUpdateDateTime:
        $ref: ./StatusUpdateDateTime.yaml
      Permissions:
        type: array
        items:
          description: >-
            Specifies the Open Banking account access data types. This is a list
            of the data clusters being consented by the PSU, and requested for
            authorisation with the ASPSP.
          type: string
          enum:
            - ReadAccountsBasic
            - ReadAccountsDetail
            - ReadBalances
            - ReadBeneficiariesBasic
            - ReadBeneficiariesDetail
            - ReadDirectDebits
            - ReadOffers
            - ReadPAN
            - ReadParty
            - ReadPartyPSU
            - ReadProducts
            - ReadScheduledPaymentsBasic
            - ReadScheduledPaymentsDetail
            - ReadStandingOrdersBasic
            - ReadStandingOrdersDetail
            - ReadStatementsBasic
            - ReadStatementsDetail
            - ReadTransactionsBasic
            - ReadTransactionsCredits
            - ReadTransactionsDebits
            - ReadTransactionsDetail
        minItems: 1
      ExpirationDateTime:
        description: >-
          Specified date and time the permissions will expire.

          If this is not populated, the permissions will be open ended.All dates
          in the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      TransactionFromDateTime:
        description: >-
          Specified start date and time for the transaction query period.

          If this is not populated, the start date will be open ended, and data
          will be returned from the earliest available transaction.All dates in
          the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      TransactionToDateTime:
        description: >-
          Specified end date and time for the transaction query period.

          If this is not populated, the end date will be open ended, and data
          will be returned to the latest available transaction.All dates in the
          JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
  Risk:
    $ref: ./OBRisk2.yaml
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
additionalProperties: false
