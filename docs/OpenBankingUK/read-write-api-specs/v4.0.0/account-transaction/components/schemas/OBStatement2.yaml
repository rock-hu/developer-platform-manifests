type: object
description: Provides further details on a statement resource.
required:
  - AccountId
  - Type
  - StartDateTime
  - EndDateTime
  - CreationDateTime
properties:
  AccountId:
    $ref: ./AccountId.yaml
  StatementId:
    $ref: ./StatementId.yaml
  StatementReference:
    $ref: ./StatementReference.yaml
  Type:
    $ref: ./OBInternalStatementType1Code.yaml
  StartDateTime:
    $ref: ./StartDateTime.yaml
  EndDateTime:
    $ref: ./EndDateTime.yaml
  CreationDateTime:
    $ref: ./CreationDateTime.yaml
  StatementDescription:
    type: array
    items:
      description: Other descriptions that may be available for the statement resource.
      type: string
      example: August 2017 Statement
      minLength: 1
      maxLength: 500
  StatementBenefit:
    type: array
    items:
      type: object
      description: >-
        Set of elements used to provide details of a benefit or reward amount
        for the statement resource.
      required:
        - Type
        - Amount
      properties:
        Type:
          $ref: ./OBInternalStatementBenefitType1Code.yaml
        Amount:
          $ref: ./OBActiveOrHistoricCurrencyAndAmount_5.yaml
  StatementFee:
    type: array
    items:
      type: object
      description: >-
        Set of elements used to provide details of a fee for the statement
        resource.
      required:
        - CreditDebitIndicator
        - Type
        - Amount
      properties:
        Description:
          $ref: ./Description_1.yaml
        CreditDebitIndicator:
          $ref: ./OBCreditDebitCode_0.yaml
        Type:
          $ref: ./OBInternalStatementFeeType1Code.yaml
        Rate:
          $ref: ./OBRate1_0.yaml
        RateType:
          $ref: ./OBInternalStatementFeeRateType1Code.yaml
        Frequency:
          $ref: ./OBInternalStatementFeeFrequency1Code.yaml
        Amount:
          $ref: ./OBActiveOrHistoricCurrencyAndAmount_6.yaml
  StatementInterest:
    type: array
    items:
      type: object
      description: >-
        Set of elements used to provide details of a generic interest amount
        related to the statement resource.
      required:
        - CreditDebitIndicator
        - Type
        - Amount
      properties:
        Description:
          $ref: ./Description_2.yaml
        CreditDebitIndicator:
          $ref: ./OBCreditDebitCode_0.yaml
        Type:
          $ref: ./OBInternalStatementInterestType1Code.yaml
        Rate:
          $ref: ./OBRate1_1.yaml
        RateType:
          $ref: ./OBInternalStatementInterestType1Code.yaml
        Frequency:
          $ref: ./OBInternalStatementInterestFrequency1Code.yaml
        Amount:
          $ref: ./OBActiveOrHistoricCurrencyAndAmount_7.yaml
  StatementAmount:
    type: array
    items:
      type: object
      description: >-
        Set of elements used to provide details of a generic amount for the
        statement resource.
      required:
        - CreditDebitIndicator
        - Type
        - Amount
      properties:
        CreditDebitIndicator:
          $ref: ./OBCreditDebitCode_0.yaml
        Type:
          $ref: ./OBInternalStatementAmountType1Code.yaml
        Amount:
          type: object
          required:
            - Amount
            - Currency
          description: Amount of money of the cash balance.
          properties:
            Amount:
              $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
            Currency:
              $ref: ./ActiveOrHistoricCurrencyCode_1.yaml
            SubType:
              description: >-
                The amount in the domestic or base accounting currency. Default
                is Base Currency (BCUR) if not specified
              type: string
              enum:
                - BCUR
                - LCUR
              default: BCUR
        LocalAmount:
          type: object
          required:
            - Amount
            - Currency
          description: >-
            Optional component providing the equivalent of Amount in local
            currency.
          properties:
            Amount:
              $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
            Currency:
              $ref: ./ActiveOrHistoricCurrencyCode_1.yaml
            SubType:
              description: >-
                The amount in the local market currency for which the asset is
                held. Default is Local Currency (LCUR) if not specified
              type: string
              enum:
                - BCUR
                - LCUR
              default: LCUR
  StatementDateTime:
    type: array
    items:
      type: object
      description: >-
        Set of elements used to provide details of a generic date time for the
        statement resource.
      required:
        - DateTime
        - Type
      properties:
        DateTime:
          $ref: ./DateTime.yaml
        Type:
          $ref: ./OBInternalStatementDateTimeType1Code.yaml
  StatementRate:
    type: array
    items:
      type: object
      description: >-
        Set of elements used to provide details of a generic rate related to the
        statement resource.
      required:
        - Rate
        - Type
      properties:
        Rate:
          $ref: ./Rate.yaml
        Type:
          $ref: ./OBInternalStatementRateType1Code.yaml
  StatementValue:
    type: array
    items:
      type: object
      description: >-
        Set of elements used to provide details of a generic number value
        related to the statement resource.
      required:
        - Value
        - Type
      properties:
        Value:
          $ref: ./Value.yaml
        Type:
          $ref: ./OBInternalStatementValueType1Code.yaml
  TotalValue:
    type: object
    description: Combined sum of all Amounts in the accounts base currency
    required:
      - Amount
      - Currency
    properties:
      Amount:
        $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
      Currency:
        $ref: ./ActiveOrHistoricCurrencyCode_1.yaml
additionalProperties: false
