type: object
required:
  - Data
properties:
  Data:
    type: object
    properties:
      Offer:
        type: array
        items:
          type: object
          required:
            - AccountId
          properties:
            AccountId:
              $ref: ./AccountId.yaml
            OfferId:
              description: >-
                A unique and immutable identifier used to identify the offer
                resource. This identifier has no meaning to the account owner.
              type: string
              example: Offer1
              minLength: 1
              maxLength: 40
            OfferType:
              description: Offer type, in a coded form.
              type: string
              example: LimitIncrease
              enum:
                - BalanceTransfer
                - LimitIncrease
                - MoneyTransfer
                - Other
                - PromotionalRate
            Description:
              description: Further details of the offer.
              type: string
              example: Credit limit increase for the account up to £10000.00
              minLength: 1
              maxLength: 500
            StartDateTime:
              description: >-
                Date and time at which the offer starts.All dates in the JSON
                payloads are represented in ISO 8601 date-time format. 

                All date-time fields in responses must include the timezone. An
                example is below:

                2017-04-05T10:43:07+00:00
              type: string
              example: '2024-05-29T00:00:00Z'
              format: date-time
            EndDateTime:
              description: >-
                Date and time at which the offer ends.All dates in the JSON
                payloads are represented in ISO 8601 date-time format. 

                All date-time fields in responses must include the timezone. An
                example is below:

                2017-04-05T10:43:07+00:00
              type: string
              example: '2024-06-29T00:00:00Z'
              format: date-time
            Rate:
              description: Rate associated with the offer type.
              type: string
              example: '100.00'
              pattern: ^(-?\d{1,3}){1}(\.\d{1,4}){0,1}$
            Value:
              description: Value associated with the offer type.
              example: 10
              type: integer
            Term:
              description: Further details of the term of the offer.
              type: string
              example: Starting first of the month and ending at the end of year
              minLength: 1
              maxLength: 500
            URL:
              description: >-
                URL (Uniform Resource Locator) where documentation on the offer
                can be found
              type: string
              example: http://modelbank.com/offer/offer1
              minLength: 1
              maxLength: 256
            Amount:
              type: object
              required:
                - Amount
                - Currency
              description: Amount of money associated with the offer type.
              properties:
                Amount:
                  $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
                Currency:
                  $ref: ./ActiveOrHistoricCurrencyCode_1.yaml
            Fee:
              type: object
              required:
                - Amount
                - Currency
              description: Fee associated with the offer type.
              properties:
                Amount:
                  $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
                Currency:
                  $ref: ./ActiveOrHistoricCurrencyCode_1.yaml
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
additionalProperties: false
