description: >-
  Regularity with which credit transfer instructions are to be created and
  processed
type: object
required:
  - Type
properties:
  Type:
    $ref: ./OBFrequency6Code.yaml
  CountPerPeriod:
    description: >-
      Number of instructions to be created and processed during the specified
      period .Specifies a frequency in terms of a count per period within a
      specified frequency type. Note: should not be used alongside `PointInTime`
    type: integer
    example: 1
    format: int32
  PointInTime:
    $ref: ./PointInTime.yaml
