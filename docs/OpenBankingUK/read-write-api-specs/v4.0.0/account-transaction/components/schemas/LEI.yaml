description: >-
  Legal entity identification as an alternate identification for a party. Legal
  Entity Identifier is a code allocated to a party as described in ISO 17442
  "Financial Services - Legal Entity Identifier (LEI)".
type: string
example: IZ9Q00LZEVUKWCQY6X15
minLength: 1
maxLength: 20
pattern: ^[0-9]{4}[0]{2}[A-Z0-9]{12}[0-9]{2}
