description: >-
  Date and time at which the resource was created.All dates in the JSON payloads
  are represented in ISO 8601 date-time format. 

  All date-time fields in responses must include the timezone. An example is
  below:

  2017-04-05T10:43:07+00:00
type: string
example: '2024-05-29T00:00:00Z'
format: date-time
