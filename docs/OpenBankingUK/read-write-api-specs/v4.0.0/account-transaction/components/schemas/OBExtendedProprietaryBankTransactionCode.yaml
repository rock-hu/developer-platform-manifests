type: object
description: >-
  Additional proprietary bank transaction codes used by the ASPSP for the
  underlying transaction
required:
  - Code
properties:
  Code:
    type: string
    description: Proprietary bank transaction code to identify the underlying transaction.
    minLength: 1
    maxLength: 35
  Issuer:
    type: string
    description: Identification of the issuer of the proprietary bank transaction code.
    minLength: 1
    maxLength: 35
  Description:
    type: string
    description: Description of the code and its usage on the ASPSP channel
    minLength: 1
    maxLength: 500
