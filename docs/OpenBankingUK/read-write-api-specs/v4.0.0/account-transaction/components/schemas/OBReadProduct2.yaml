type: object
required:
  - Data
description: Product details of Other Product which is not avaiable in the standard list
properties:
  Data:
    type: object
    description: Aligning with the read write specs structure.
    properties:
      Product:
        type: array
        items:
          type: object
          description: Product details associated with the Account
          required:
            - AccountId
            - ProductType
          properties:
            ProductName:
              description: >-
                The name of the Product used for marketing purposes from a
                customer perspective. I.e. what the customer would recognise.
              type: string
              example: 321 Product
              minLength: 1
              maxLength: 350
            ProductId:
              description: >-
                The unique ID that has been internally assigned by the financial
                institution to each of the current account banking products they
                market to their retail and/or small to medium enterprise (SME)
                customers.
              type: string
              example: 51B
              minLength: 1
              maxLength: 40
            AccountId:
              $ref: ./AccountId.yaml
            SecondaryProductId:
              description: >-
                Any secondary Identification which  supports Product Identifier
                to uniquely identify the current account banking products.
              type: string
              example: CA78
              minLength: 1
              maxLength: 70
            ProductType:
              description: >-
                Product type : Personal Current Account, Business Current
                Account
              type: string
              example: PersonalCurrentAccount
              enum:
                - BusinessCurrentAccount
                - CommercialCreditCard
                - Other
                - PersonalCurrentAccount
                - SMELoan
            MarketingStateId:
              description: >-
                Unique and unambiguous identification of a  Product Marketing
                State.
              type: string
              example: '22878123'
              minLength: 1
              maxLength: 35
            OtherProductType:
              type: object
              required:
                - Name
                - Description
              description: Other product type details associated with the account.
              properties:
                Name:
                  description: Long name associated with the product
                  type: string
                  example: e-Wallet
                  minLength: 1
                  maxLength: 350
                Description:
                  description: Description of the Product associated with the account
                  type: string
                  example: Virtual wallet
                  minLength: 1
                  maxLength: 350
                ProductDetails:
                  type: object
                  properties:
                    Segment:
                      type: array
                      items:
                        description: >-
                          Market segmentation is a marketing term referring to
                          the aggregating of prospective buyers into groups, or
                          segments, that have common needs and respond similarly
                          to a marketing action. Market segmentation enables
                          companies to target different categories of consumers
                          who perceive the full value of certain products and
                          services differently from one another.

                          Read more: Market Segmentation
                          http://www.investopedia.com/terms/m/marketsegmentation.asp#ixzz4gfEEalTd 
                        type: string
                        enum:
                          - GEAS
                          - GEBA
                          - GEBR
                          - GEBU
                          - GECI
                          - GECS
                          - GEFB
                          - GEFG
                          - GEG
                          - GEGR
                          - GEGS
                          - GEOT
                          - GEOV
                          - GEPA
                          - GEPR
                          - GERE
                          - GEST
                          - GEYA
                          - GEYO
                          - PSCA
                          - PSES
                          - PSNC
                          - PSNP
                          - PSRG
                          - PSSS
                          - PSST
                          - PSSW
                    FeeFreeLength:
                      description: The length/duration of the fee free period
                      type: integer
                    FeeFreeLengthPeriod:
                      description: >-
                        The unit of period (days, weeks, months etc.) of the
                        promotional length
                      type: string
                      enum:
                        - PACT
                        - PDAY
                        - PHYR
                        - PMTH
                        - PQTR
                        - PWEK
                        - PYER
                    MonthlyMaximumCharge:
                      description: >-
                        The maximum relevant charges that could accrue as
                        defined fully in Part 7 of the CMA order
                      type: string
                      pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                    Notes:
                      type: array
                      items:
                        description: >-
                          Optional additional notes to supplement the Core
                          product details
                        type: string
                        minLength: 1
                        maxLength: 2000
                    OtherSegment:
                      $ref: ./OB_OtherCodeType1_0.yaml
                CreditInterest:
                  type: object
                  required:
                    - TierBandSet
                  description: >-
                    Details about the interest that may be payable to the
                    Account holders
                  properties:
                    TierBandSet:
                      type: array
                      items:
                        type: object
                        description: >-
                          The group of tiers or bands for which credit interest
                          can be applied.
                        required:
                          - TierBandMethod
                          - Destination
                          - TierBand
                        properties:
                          TierBandMethod:
                            description: >-
                              The methodology of how credit interest is
                              paid/applied. It can be:-

                              1. Banded

                              Interest rates are banded. i.e. Increasing rate on
                              whole balance as balance increases.

                              2. Tiered

                              Interest rates are tiered. i.e. increasing rate
                              for each tier as balance increases, but interest
                              paid on tier fixed for that tier and not on whole
                              balance.

                              3. Whole

                              The same interest rate is applied irrespective of
                              the product holder's account balance
                            type: string
                            enum:
                              - INBA
                              - INTI
                              - INWH
                          CalculationMethod:
                            $ref: ./OB_InterestCalculationMethod1Code.yaml
                          Destination:
                            description: >-
                              Describes whether accrued interest is payable only
                              to the BCA or to another bank account
                            type: string
                            enum:
                              - INOT
                              - INPA
                              - INSC
                          Notes:
                            type: array
                            items:
                              description: >-
                                Optional additional notes to supplement the Tier
                                Band Set details
                              type: string
                              minLength: 1
                              maxLength: 2000
                          OtherCalculationMethod:
                            $ref: ./OB_OtherCodeType1_0.yaml
                          OtherDestination:
                            $ref: ./OB_OtherCodeType1_0.yaml
                          TierBand:
                            type: array
                            items:
                              type: object
                              description: Tier Band Details
                              required:
                                - TierValueMinimum
                                - ApplicationFrequency
                                - FixedVariableInterestRateType
                                - AER
                              properties:
                                Identification:
                                  description: >-
                                    Unique and unambiguous identification of a 
                                    Tier Band for the Product.
                                  type: string
                                  minLength: 1
                                  maxLength: 35
                                TierValueMinimum:
                                  description: >-
                                    Minimum deposit value for which the credit
                                    interest tier applies.
                                  type: string
                                  pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                TierValueMaximum:
                                  description: >-
                                    Maximum deposit value for which the credit
                                    interest tier applies.
                                  type: string
                                  pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                CalculationFrequency:
                                  description: >-
                                    How often is credit interest calculated for
                                    the account.
                                  type: string
                                  enum:
                                    - FQAT
                                    - FQDY
                                    - FQHY
                                    - FQMY
                                    - FQOT
                                    - FQQY
                                    - FQSD
                                    - FQWY
                                    - FQYY
                                ApplicationFrequency:
                                  description: >-
                                    How often is interest applied to the Product
                                    for this tier/band i.e. how often the
                                    financial institution pays accumulated
                                    interest to the customer's account.
                                  type: string
                                  enum:
                                    - FQAT
                                    - FQDY
                                    - FQHY
                                    - FQMY
                                    - FQOT
                                    - FQQY
                                    - FQSD
                                    - FQWY
                                    - FQYY
                                DepositInterestAppliedCoverage:
                                  description: Amount on which Interest applied.
                                  type: string
                                  enum:
                                    - INBA
                                    - INTI
                                    - INWH
                                FixedVariableInterestRateType:
                                  $ref: ./OB_InterestFixedVariableType1Code.yaml
                                AER:
                                  description: >-
                                    The annual equivalent rate (AER) is interest
                                    that is calculated under the assumption that
                                    any interest paid is combined with the
                                    original balance and the next interest
                                    payment will be based on the slightly higher
                                    account balance. Overall, this means that
                                    interest can be compounded several times in
                                    a year depending on the number of times that
                                    interest payments are made. 

                                    Read more: Annual Equivalent Rate (AER)
                                    http://www.investopedia.com/terms/a/aer.asp#ixzz4gfR7IO1A
                                  type: string
                                  pattern: ^(-?\d{1,3}){1}(\.\d{1,4}){0,1}$
                                BankInterestRateType:
                                  description: >-
                                    Interest rate types, other than AER, which
                                    financial institutions may use to describe
                                    the annual interest rate payable to the
                                    account holder's account.
                                  type: string
                                  enum:
                                    - INBB
                                    - INFR
                                    - INGR
                                    - INLR
                                    - INNE
                                    - INOT
                                BankInterestRate:
                                  description: Bank Interest for the product
                                  type: string
                                  pattern: ^(-?\d{1,3}){1}(\.\d{1,4}){0,1}$
                                Notes:
                                  type: array
                                  items:
                                    description: >-
                                      Optional additional notes to supplement
                                      the Tier Band details
                                    type: string
                                    minLength: 1
                                    maxLength: 2000
                                OtherBankInterestType:
                                  type: object
                                  required:
                                    - Name
                                    - Description
                                  description: >-
                                    Other interest rate types which are not
                                    available in the standard code list
                                  properties:
                                    Code:
                                      $ref: ./OB_CodeMnemonic.yaml
                                    Name:
                                      $ref: ./Name_4.yaml
                                    Description:
                                      $ref: ./Description_3.yaml
                                OtherApplicationFrequency:
                                  $ref: ./OB_OtherCodeType1_1.yaml
                                OtherCalculationFrequency:
                                  $ref: ./OB_OtherCodeType1_2.yaml
                            minItems: 1
                      minItems: 1
                Overdraft:
                  type: object
                  required:
                    - OverdraftTierBandSet
                  description: Borrowing details
                  properties:
                    Notes:
                      type: array
                      items:
                        description: Associated Notes about the overdraft rates
                        type: string
                        minLength: 1
                        maxLength: 2000
                    OverdraftTierBandSet:
                      type: array
                      items:
                        type: object
                        description: Tier band set details
                        required:
                          - TierBandMethod
                          - OverdraftTierBand
                        properties:
                          TierBandMethod:
                            description: >-
                              The methodology of how overdraft is charged. It
                              can be:

                              'Whole'  Where the same charge/rate is applied to
                              the entirety of the overdraft balance (where
                              charges are applicable). 

                              'Tiered' Where different charges/rates are applied
                              dependent on overdraft maximum and minimum balance
                              amount tiers defined by the lending financial
                              organisation

                              'Banded' Where different charges/rates are applied
                              dependent on overdraft maximum and minimum balance
                              amount bands defined by a government organisation.
                            type: string
                            enum:
                              - INBA
                              - INTI
                              - INWH
                          OverdraftType:
                            description: >-
                              An overdraft can either be 'committed' which means
                              that the facility cannot be withdrawn without
                              reasonable notification before it's agreed end
                              date, or 'on demand' which means that the
                              financial institution can demand repayment at any
                              point in time.
                            type: string
                            enum:
                              - OVCO
                              - OVOD
                              - OVOT
                          Identification:
                            description: >-
                              Unique and unambiguous identification of a  Tier
                              Band for a overdraft product.
                            type: string
                            minLength: 1
                            maxLength: 35
                          AuthorisedIndicator:
                            description: >-
                              Indicates if the Overdraft is authorised (Y) or
                              unauthorised (N)
                            type: boolean
                          BufferAmount:
                            description: >-
                              When a customer exceeds their credit limit, a
                              financial institution will not charge the customer
                              unauthorised overdraft charges if they do not
                              exceed by more than the buffer amount. Note:
                              Authorised overdraft charges may still apply.
                            type: string
                            pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                          Notes:
                            type: array
                            items:
                              description: >-
                                Optional additional notes to supplement the
                                overdraft Tier Band Set details
                              type: string
                              minLength: 1
                              maxLength: 2000
                          OverdraftTierBand:
                            type: array
                            items:
                              type: object
                              description: >-
                                Provides overdraft details for a specific tier
                                or band
                              required:
                                - TierValueMin
                              properties:
                                Identification:
                                  description: >-
                                    Unique and unambiguous identification of a 
                                    Tier Band for a overdraft.
                                  type: string
                                  minLength: 1
                                  maxLength: 35
                                TierValueMin:
                                  description: Minimum value of Overdraft Tier/Band
                                  type: string
                                  pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                TierValueMax:
                                  description: Maximum value of Overdraft Tier/Band
                                  type: string
                                  pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                EAR:
                                  description: >-
                                    EAR means Effective Annual Rate and/or
                                    Equivalent Annual Rate (frequently

                                    used interchangeably), being the actual
                                    annual interest rate of an Overdraft.
                                  type: string
                                  pattern: ^(-?\d{1,3}){1}(\.\d{1,4}){0,1}$
                                AgreementLengthMin:
                                  description: >-
                                    Specifies the minimum length of a band for a
                                    fixed overdraft agreement
                                  type: integer
                                AgreementLengthMax:
                                  description: >-
                                    Specifies the maximum length of a band for a
                                    fixed overdraft agreement
                                  type: integer
                                AgreementPeriod:
                                  description: >-
                                    Specifies the period of a fixed length
                                    overdraft agreement
                                  type: string
                                  enum:
                                    - PACT
                                    - PDAY
                                    - PHYR
                                    - PMTH
                                    - PQTR
                                    - PWEK
                                    - PYER
                                OverdraftInterestChargingCoverage:
                                  description: >-
                                    Refers to which interest rate is applied
                                    when interests are tiered. For example, if
                                    an overdraft balance is  2k and the interest
                                    tiers are:- 0- 500 0.1%, 500-1000 0.2%,
                                    1000-10000 0.5%, then the applicable
                                    interest rate could either be 0.5% of the
                                    entire balance (since the account balance
                                    sits in the top interest tier) or
                                    (0.1%*500)+(0.2%*500)+(0.5%*1000). In the
                                    1st situation, we say the interest is
                                    applied to the  Whole  of the account
                                    balance,  and in the 2nd that it is  Tiered
                                    .
                                  type: string
                                  enum:
                                    - INBA
                                    - INTI
                                    - INWH
                                BankGuaranteedIndicator:
                                  description: >-
                                    Indicates whether the advertised overdraft
                                    rate is guaranteed to be offered to a
                                    borrower by the bank e.g. if it s part of a
                                    government scheme, or whether the rate may
                                    vary dependent on the applicant s
                                    circumstances.
                                  type: boolean
                                Notes:
                                  type: array
                                  items:
                                    description: >-
                                      Optional additional notes to supplement
                                      the Tier/band details
                                    type: string
                                    minLength: 1
                                    maxLength: 2000
                                OverdraftFeesCharges:
                                  type: array
                                  items:
                                    type: object
                                    description: Overdraft fees and charges
                                    required:
                                      - OverdraftFeeChargeDetail
                                    properties:
                                      OverdraftFeeChargeCap:
                                        type: array
                                        items:
                                          type: object
                                          description: >-
                                            Details about any caps (maximum charges)
                                            that apply to a particular fee/charge.
                                            Capping can either be based on an amount
                                            (in gbp), an amount (in items) or a
                                            rate.
                                          required:
                                            - FeeType
                                            - MinMaxType
                                          properties:
                                            FeeType:
                                              type: array
                                              items:
                                                description: Fee/charge type which is being capped
                                                type: string
                                                enum:
                                                  - FBAO
                                                  - FBAR
                                                  - FBEB
                                                  - FBIT
                                                  - FBOR
                                                  - FBOS
                                                  - FBSC
                                                  - FBTO
                                                  - FBUB
                                                  - FBUT
                                                  - FTOT
                                                  - FTUT
                                              minItems: 1
                                            MinMaxType:
                                              $ref: ./OB_MinMaxType1Code.yaml
                                            FeeCapOccurrence:
                                              $ref: ./Number_0.yaml
                                            FeeCapAmount:
                                              $ref: ./OB_Amount1_0.yaml
                                            CappingPeriod:
                                              $ref: ./OB_Period1Code.yaml
                                            Notes:
                                              type: array
                                              items:
                                                description: >-
                                                  Notes related to Overdraft fee charge
                                                  cap
                                                type: string
                                                minLength: 1
                                                maxLength: 2000
                                            OtherFeeType:
                                              type: array
                                              items:
                                                type: object
                                                description: >-
                                                  Other fee type code which is not
                                                  available in the standard code set
                                                required:
                                                  - Name
                                                  - Description
                                                properties:
                                                  Code:
                                                    $ref: ./OB_CodeMnemonic.yaml
                                                  Name:
                                                    $ref: ./Name_4.yaml
                                                  Description:
                                                    $ref: ./Description_3.yaml
                                      OverdraftFeeChargeDetail:
                                        type: array
                                        items:
                                          type: object
                                          description: Details about the fees/charges
                                          required:
                                            - FeeType
                                            - ApplicationFrequency
                                          properties:
                                            FeeType:
                                              $ref: ./OB_OverdraftFeeType1Code.yaml
                                            NegotiableIndicator:
                                              description: >-
                                                Indicates whether fee and charges are
                                                negotiable
                                              type: boolean
                                            OverdraftControlIndicator:
                                              description: >-
                                                Indicates if the fee/charge is already
                                                covered by an 'Overdraft Control' fee or
                                                not.
                                              type: boolean
                                            IncrementalBorrowingAmount:
                                              $ref: ./OB_Amount1_1.yaml
                                            FeeAmount:
                                              $ref: ./OB_Amount1_2.yaml
                                            FeeRate:
                                              $ref: ./OB_Rate1_0.yaml
                                            FeeRateType:
                                              $ref: ./OB_InterestRateType1Code_0.yaml
                                            ApplicationFrequency:
                                              $ref: ./OB_FeeFrequency1Code_0.yaml
                                            CalculationFrequency:
                                              $ref: ./OB_FeeFrequency1Code_1.yaml
                                            Notes:
                                              type: array
                                              items:
                                                description: >-
                                                  Free text for capturing any other info
                                                  related to Overdraft Fees Charge Details
                                                type: string
                                                minLength: 1
                                                maxLength: 2000
                                            OverdraftFeeChargeCap:
                                              type: array
                                              items:
                                                type: object
                                                description: >-
                                                  Details about any caps (maximum charges)
                                                  that apply to a particular fee/charge.
                                                  Capping can either be based on an amount
                                                  (in gbp), an amount (in items) or a
                                                  rate.
                                                required:
                                                  - FeeType
                                                  - MinMaxType
                                                properties:
                                                  FeeType:
                                                    type: array
                                                    items:
                                                      description: Fee/charge type which is being capped
                                                      type: string
                                                      enum:
                                                        - FBAO
                                                        - FBAR
                                                        - FBEB
                                                        - FBIT
                                                        - FBOR
                                                        - FBOS
                                                        - FBSC
                                                        - FBTO
                                                        - FBUB
                                                        - FBUT
                                                        - FTOT
                                                        - FTUT
                                                    minItems: 1
                                                  MinMaxType:
                                                    $ref: ./OB_MinMaxType1Code.yaml
                                                  FeeCapOccurrence:
                                                    $ref: ./Number_0.yaml
                                                  FeeCapAmount:
                                                    $ref: ./OB_Amount1_0.yaml
                                                  CappingPeriod:
                                                    $ref: ./OB_Period1Code.yaml
                                                  Notes:
                                                    type: array
                                                    items:
                                                      description: >-
                                                        Notes related to Overdraft fee charge
                                                        cap
                                                      type: string
                                                      minLength: 1
                                                      maxLength: 2000
                                                  OtherFeeType:
                                                    type: array
                                                    items:
                                                      type: object
                                                      description: >-
                                                        Other fee type code which is not
                                                        available in the standard code set
                                                      required:
                                                        - Name
                                                        - Description
                                                      properties:
                                                        Code:
                                                          $ref: ./OB_CodeMnemonic.yaml
                                                        Name:
                                                          $ref: ./Name_4.yaml
                                                        Description:
                                                          $ref: ./Description_3.yaml
                                            OtherFeeType:
                                              $ref: ./OB_OtherCodeType1_3.yaml
                                            OtherFeeRateType:
                                              $ref: ./OB_OtherCodeType1_4.yaml
                                            OtherApplicationFrequency:
                                              $ref: ./OB_OtherCodeType1_1.yaml
                                            OtherCalculationFrequency:
                                              $ref: ./OB_OtherCodeType1_2.yaml
                                        minItems: 1
                            minItems: 1
                          OverdraftFeesCharges:
                            type: array
                            items:
                              type: object
                              description: Overdraft fees and charges details
                              required:
                                - OverdraftFeeChargeDetail
                              properties:
                                OverdraftFeeChargeCap:
                                  type: array
                                  items:
                                    type: object
                                    description: >-
                                      Details about any caps (maximum charges)
                                      that apply to a particular fee/charge.
                                      Capping can either be based on an amount
                                      (in gbp), an amount (in items) or a rate.
                                    required:
                                      - FeeType
                                      - MinMaxType
                                    properties:
                                      FeeType:
                                        type: array
                                        items:
                                          description: Fee/charge type which is being capped
                                          type: string
                                          enum:
                                            - FBAO
                                            - FBAR
                                            - FBEB
                                            - FBIT
                                            - FBOR
                                            - FBOS
                                            - FBSC
                                            - FBTO
                                            - FBUB
                                            - FBUT
                                            - FTOT
                                            - FTUT
                                        minItems: 1
                                      MinMaxType:
                                        $ref: ./OB_MinMaxType1Code.yaml
                                      FeeCapOccurrence:
                                        $ref: ./Number_0.yaml
                                      FeeCapAmount:
                                        $ref: ./OB_Amount1_0.yaml
                                      CappingPeriod:
                                        $ref: ./OB_Period1Code.yaml
                                      Notes:
                                        type: array
                                        items:
                                          description: >-
                                            Notes related to Overdraft fee charge
                                            cap
                                          type: string
                                          minLength: 1
                                          maxLength: 2000
                                      OtherFeeType:
                                        type: array
                                        items:
                                          type: object
                                          description: >-
                                            Other fee type code which is not
                                            available in the standard code set
                                          required:
                                            - Name
                                            - Description
                                          properties:
                                            Code:
                                              $ref: ./OB_CodeMnemonic.yaml
                                            Name:
                                              $ref: ./Name_4.yaml
                                            Description:
                                              $ref: ./Description_3.yaml
                                OverdraftFeeChargeDetail:
                                  type: array
                                  items:
                                    type: object
                                    description: Details about the fees/charges
                                    required:
                                      - FeeType
                                      - ApplicationFrequency
                                    properties:
                                      FeeType:
                                        $ref: ./OB_OverdraftFeeType1Code.yaml
                                      NegotiableIndicator:
                                        description: >-
                                          Indicates whether fee and charges are
                                          negotiable
                                        type: boolean
                                      OverdraftControlIndicator:
                                        description: >-
                                          Indicates if the fee/charge is already
                                          covered by an 'Overdraft Control' fee or
                                          not.
                                        type: boolean
                                      IncrementalBorrowingAmount:
                                        $ref: ./OB_Amount1_1.yaml
                                      FeeAmount:
                                        $ref: ./OB_Amount1_2.yaml
                                      FeeRate:
                                        $ref: ./OB_Rate1_0.yaml
                                      FeeRateType:
                                        $ref: ./OB_InterestRateType1Code_0.yaml
                                      ApplicationFrequency:
                                        $ref: ./OB_FeeFrequency1Code_0.yaml
                                      CalculationFrequency:
                                        $ref: ./OB_FeeFrequency1Code_1.yaml
                                      Notes:
                                        type: array
                                        items:
                                          description: >-
                                            Free text for capturing any other info
                                            related to Overdraft Fees Charge Details
                                          type: string
                                          minLength: 1
                                          maxLength: 2000
                                      OverdraftFeeChargeCap:
                                        type: array
                                        items:
                                          type: object
                                          description: >-
                                            Details about any caps (maximum charges)
                                            that apply to a particular fee/charge.
                                            Capping can either be based on an amount
                                            (in gbp), an amount (in items) or a
                                            rate.
                                          required:
                                            - FeeType
                                            - MinMaxType
                                          properties:
                                            FeeType:
                                              type: array
                                              items:
                                                description: Fee/charge type which is being capped
                                                type: string
                                                enum:
                                                  - FBAO
                                                  - FBAR
                                                  - FBEB
                                                  - FBIT
                                                  - FBOR
                                                  - FBOS
                                                  - FBSC
                                                  - FBTO
                                                  - FBUB
                                                  - FBUT
                                                  - FTOT
                                                  - FTUT
                                              minItems: 1
                                            MinMaxType:
                                              $ref: ./OB_MinMaxType1Code.yaml
                                            FeeCapOccurrence:
                                              $ref: ./Number_0.yaml
                                            FeeCapAmount:
                                              $ref: ./OB_Amount1_0.yaml
