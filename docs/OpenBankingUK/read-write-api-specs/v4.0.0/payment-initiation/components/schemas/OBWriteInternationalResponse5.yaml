type: object
additionalProperties: false
required:
  - Data
properties:
  Data:
    type: object
    additionalProperties: false
    required:
      - InternationalPaymentId
      - ConsentId
      - CreationDateTime
      - Status
      - StatusUpdateDateTime
      - Initiation
    properties:
      InternationalPaymentId:
        description: >-
          OB: Unique identification as assigned by the ASPSP to uniquely
          identify the international payment resource.
        type: string
        minLength: 1
        maxLength: 40
      ConsentId:
        description: >-
          OB: Unique identification as assigned by the ASPSP to uniquely
          identify the consent resource.
        type: string
        minLength: 1
        maxLength: 128
      CreationDateTime:
        description: >-
          Date and time at which the message was created.All dates in the JSON
          payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      Status:
        description: Specifies the status of the payment information group.
        type: string
        enum:
          - PDNG
          - ACTC
          - PATC
          - ACCP
          - ACFC
          - ACSP
          - ACWC
          - ACSC
          - ACWP
          - ACCC
          - BLCK
          - RJCT
      StatusUpdateDateTime:
        description: >-
          Date and time at which the resource status was updated.All dates in
          the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      StatusReason:
        type: array
        items:
          $ref: ./OBStatusReason.yaml
      ExpectedExecutionDateTime:
        description: >-
          Expected execution date and time for the payment resource.All dates in
          the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      ExpectedSettlementDateTime:
        description: >-
          Expected settlement date and time for the payment resource.All dates
          in the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      Refund:
        type: object
        additionalProperties: false
        required:
          - Account
        properties:
          Creditor:
            type: object
            additionalProperties: false
            description: Set of elements used to identify a person or an organisation.
            properties:
              Name:
                description: >-
                  Name by which a party is known and which is usually used to
                  identify that party.
                type: string
                minLength: 1
                maxLength: 140
              LEI:
                $ref: ./LEI.yaml
              PostalAddress:
                $ref: ./OBPostalAddress7.yaml
          Agent:
            type: object
            additionalProperties: false
            description: >-
              Set of elements used to uniquely and unambiguously identify a
              financial institution or a branch of a financial institution.
            properties:
              SchemeName:
                $ref: ./OBInternalFinancialInstitutionIdentification4Code.yaml
              Identification:
                $ref: ./Identification_1.yaml
              Name:
                $ref: ./Name.yaml
              PostalAddress:
                $ref: ./OBPostalAddress7.yaml
          Account:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
              - Name
            description: Provides the details to identify an account.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  Name of the account, as assigned by the account servicing
                  institution.

                  Usage: The account name is the name or names of the account
                  owner(s) represented at an account level. The account name is
                  not the product name or the nickname of the account.

                  OB: ASPSPs may carry out name validation for Confirmation of
                  Payee, but it is not mandatory.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
      Charges:
        type: array
        items:
          type: object
          additionalProperties: false
          description: >-
            Set of elements used to provide details of a charge for the payment
            initiation.
          required:
            - ChargeBearer
            - Type
            - Amount
          properties:
            ChargeBearer:
              $ref: ./OBInternalChargeBearerType1Code.yaml
            Type:
              $ref: ./OBInternalPaymentChargeType1Code.yaml
            Amount:
              $ref: ./OBActiveOrHistoricCurrencyAndAmount.yaml
      ExchangeRateInformation:
        type: object
        additionalProperties: false
        required:
          - UnitCurrency
          - ExchangeRate
          - RateType
        description: >-
          Further detailed information on the exchange rate that has been used
          in the payment transaction.
        properties:
          UnitCurrency:
            description: >-
              Currency in which the rate of exchange is expressed in a currency
              exchange. In the example 1GBP = xxxCUR, the unit currency is GBP.
            type: string
            pattern: ^[A-Z]{3,3}$
          ExchangeRate:
            description: >-
              The factor used for conversion of an amount from one currency to
              another. This reflects the price at which one currency was bought
              with another currency.
            type: number
          RateType:
            description: Specifies the type used to complete the currency exchange.
            type: string
            enum:
              - Actual
              - Agreed
              - Indicative
          ContractIdentification:
            description: >-
              Unique and unambiguous reference to the foreign exchange contract
              agreed between the initiating party/creditor and the debtor agent.
            type: string
            minLength: 1
            maxLength: 256
          ExpirationDateTime:
            description: >-
              Specified date and time the exchange rate agreement will
              expire.All dates in the JSON payloads are represented in ISO 8601
              date-time format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
      Initiation:
        type: object
        additionalProperties: false
        required:
          - InstructionIdentification
          - EndToEndIdentification
          - CurrencyOfTransfer
          - InstructedAmount
          - CreditorAccount
        description: >-
          The Initiation payload is sent by the initiating party to the ASPSP.
          It is used to request movement of funds from the debtor account to a
          creditor for a single international payment.
        properties:
          InstructionIdentification:
            description: >-
              Unique identification as assigned by an instructing party for an
              instructed party to unambiguously identify the instruction.

              Usage: the  instruction identification is a point to point
              reference that can be used between the instructing party and the
              instructed party to refer to the individual instruction. It can be
              included in several messages related to the instruction.
            type: string
            minLength: 1
            maxLength: 35
          EndToEndIdentification:
            description: >-
              Unique identification assigned by the initiating party to
              unambiguously identify the transaction. This identification is
              passed on, unchanged, throughout the entire end-to-end chain.

              Usage: The end-to-end identification can be used for
              reconciliation or to link tasks relating to the transaction. It
              can be included in several messages related to the transaction.

              OB: The Faster Payments Scheme can only access 31 characters for
              the EndToEndIdentification field.
            type: string
            minLength: 1
            maxLength: 35
          LocalInstrument:
            $ref: ./OBInternalLocalInstrument1Code.yaml
          InstructionPriority:
            description: >-
              Indicator of the urgency or order of importance that the
              instructing party would like the instructed party to apply to the
              processing of the instruction.
            type: string
            enum:
              - Normal
              - Urgent
          Purpose:
            description: >-
              Specifies the external purpose code in the format of character
              string with a maximum length of 4 characters.

              The list of valid codes is an external code list published
              separately.

              External code sets can be downloaded from www.iso20022.org.
            type: string
            minLength: 1
            maxLength: 4
          ExtendedPurpose:
            description: >-
              Specifies the purpose of an international payment, when there is
              no corresponding 4 character code available in the ISO20022 list
              of Purpose Codes.
            type: string
            minLength: 1
            maxLength: 140
          ChargeBearer:
            $ref: ./OBInternalChargeBearerType1Code.yaml
          CurrencyOfTransfer:
            description: >-
              Specifies the currency of the to be transferred amount, which is
              different from the currency of the debtor's account.
            type: string
            pattern: ^[A-Z]{3,3}$
          DestinationCountryCode:
            description: >-
              Country in which Credit Account is domiciled. Code to identify a
              country, a dependency, or another area of particular geopolitical
              interest, on the basis of country names obtained from the United
              Nations (ISO 3166, Alpha-2 code).
            type: string
            pattern: '[A-Z]{2,2}'
          InstructedAmount:
            type: object
            additionalProperties: false
            required:
              - Amount
              - Currency
            description: >-
              Amount of money to be moved between the debtor and creditor,
              before deduction of charges, expressed in the currency as ordered
              by the initiating party.

              Usage: This amount has to be transported unchanged through the
              transaction chain.
            properties:
              Amount:
                $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
              Currency:
                $ref: ./ActiveOrHistoricCurrencyCode.yaml
          ExchangeRateInformation:
            type: object
            additionalProperties: false
            required:
              - UnitCurrency
              - RateType
            description: Provides details on the currency exchange rate and contract.
            properties:
              UnitCurrency:
                description: >-
                  Currency in which the rate of exchange is expressed in a
                  currency exchange. In the example 1GBP = xxxCUR, the unit
                  currency is GBP.
                type: string
                pattern: ^[A-Z]{3,3}$
              ExchangeRate:
                description: >-
                  The factor used for conversion of an amount from one currency
                  to another. This reflects the price at which one currency was
                  bought with another currency.
                type: number
              RateType:
                description: Specifies the type used to complete the currency exchange.
                type: string
                enum:
                  - Actual
                  - Agreed
                  - Indicative
              ContractIdentification:
                description: >-
                  Unique and unambiguous reference to the foreign exchange
                  contract agreed between the initiating party/creditor and the
                  debtor agent.
                type: string
                minLength: 1
                maxLength: 256
          DebtorAccount:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
            description: >-
              Unambiguous identification of the account of the debtor to which a
              debit entry will be made as a result of the transaction.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  The account name is the name or names of the account owner(s)
                  represented at an account level, as displayed by the ASPSP's
                  online channels.

                  Note, the account name is not the product name or the nickname
                  of the account.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
          Creditor:
            type: object
            additionalProperties: false
            description: Party to which an amount of money is due.
            properties:
              Name:
                description: >-
                  Name by which a party is known and which is usually used to
                  identify that party.
                type: string
                minLength: 1
                maxLength: 140
              LEI:
                $ref: ./LEI.yaml
              PostalAddress:
                $ref: ./OBPostalAddress7.yaml
          CreditorAgent:
            type: object
            additionalProperties: false
            description: Financial institution servicing an account for the creditor.
            properties:
              SchemeName:
                $ref: ./OBInternalFinancialInstitutionIdentification4Code.yaml
              Identification:
                $ref: ./Identification_1.yaml
              Name:
                $ref: ./Name.yaml
              LEI:
                $ref: ./LEI.yaml
              PostalAddress:
                $ref: ./OBPostalAddress7.yaml
          CreditorAccount:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
              - Name
            description: >-
              Unambiguous identification of the account of the creditor to which
              a credit entry will be posted as a result of the payment
              transaction.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  The account name is the name or names of the account owner(s)
                  represented at an account level.

                  Note, the account name is not the product name or the nickname
                  of the account.

                  OB: ASPSPs may carry out name validation for Confirmation of
                  Payee, but it is not mandatory.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
          UltimateCreditor:
            $ref: ./OBUltimateCreditor1.yaml
          UltimateDebtor:
            $ref: ./OBUltimateDebtor1.yaml
          RegulatoryReporting:
            type: array
            items:
              $ref: ./OBRegulatoryReporting1.yaml
            maxItems: 10
          RemittanceInformation:
            $ref: ./OBRemittanceInformation2.yaml
          SupplementaryData:
            $ref: ./OBSupplementaryData1.yaml
      MultiAuthorisation:
        type: object
        additionalProperties: false
        required:
          - Status
        description: The multiple authorisation flow response from the ASPSP.
        properties:
          Status:
            description: Specifies the status of the authorisation flow in code form.
            type: string
            enum:
              - AUTH
              - AWAU
              - RJCT
          NumberRequired:
            description: >-
              Number of authorisations required for payment order (total
              required at the start of the multi authorisation journey).
            type: integer
          NumberReceived:
            description: Number of authorisations received.
            type: integer
          LastUpdateDateTime:
            description: >-
              Last date and time at the authorisation flow was updated.All dates
              in the JSON payloads are represented in ISO 8601 date-time
              format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
          ExpirationDateTime:
            description: >-
              Date and time at which the requested authorisation flow must be
              completed.All dates in the JSON payloads are represented in ISO
              8601 date-time format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
      Debtor:
        $ref: ./OBCashAccountDebtor4.yaml
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
