type: object
additionalProperties: false
required:
  - Data
properties:
  Data:
    type: object
    additionalProperties: false
    properties:
      FundsAvailableResult:
        type: object
        additionalProperties: false
        required:
          - FundsAvailableDateTime
          - FundsAvailable
        description: Result of a funds availability check.
        properties:
          FundsAvailableDateTime:
            description: >-
              Date and time at which the funds availability check was
              generated.All dates in the JSON payloads are represented in ISO
              8601 date-time format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
          FundsAvailable:
            description: >-
              Flag to indicate the availability of funds given the Amount in the
              consent request.
            type: boolean
      SupplementaryData:
        $ref: ./OBSupplementaryData1.yaml
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
