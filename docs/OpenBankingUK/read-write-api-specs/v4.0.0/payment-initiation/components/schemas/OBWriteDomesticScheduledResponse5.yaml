type: object
additionalProperties: false
required:
  - Data
properties:
  Data:
    type: object
    additionalProperties: false
    required:
      - DomesticScheduledPaymentId
      - ConsentId
      - CreationDateTime
      - Status
      - StatusUpdateDateTime
      - Initiation
    properties:
      DomesticScheduledPaymentId:
        description: >-
          OB: Unique identification as assigned by the ASPSP to uniquely
          identify the domestic schedule payment resource.
        type: string
        minLength: 1
        maxLength: 40
      ConsentId:
        description: >-
          OB: Unique identification as assigned by the ASPSP to uniquely
          identify the consent resource.
        type: string
        minLength: 1
        maxLength: 128
      CreationDateTime:
        description: >-
          Date and time at which the message was created.All dates in the JSON
          payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      Status:
        description: Specifies the status of the payment order resource.
        type: string
        enum:
          - RCVD
          - RJCT
          - ACSP
      StatusUpdateDateTime:
        description: >-
          Date and time at which the resource status was updated.All dates in
          the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      StatusReason:
        type: array
        items:
          $ref: ./OBStatusReason.yaml
      ExpectedExecutionDateTime:
        description: >-
          Expected execution date and time for the payment resource.All dates in
          the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      ExpectedSettlementDateTime:
        description: >-
          Expected settlement date and time for the payment resource.All dates
          in the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      Refund:
        type: object
        additionalProperties: false
        required:
          - Account
        description: >-
          Unambiguous identification of the refund account to which a refund
          will be made as a result of the transaction.
        properties:
          Account:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
              - Name
            description: Provides the details to identify an account.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  Name of the account, as assigned by the account servicing
                  institution.

                  Usage: The account name is the name or names of the account
                  owner(s) represented at an account level. The account name is
                  not the product name or the nickname of the account.

                  OB: ASPSPs may carry out name validation for Confirmation of
                  Payee, but it is not mandatory.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
      Charges:
        type: array
        items:
          type: object
          additionalProperties: false
          description: >-
            Set of elements used to provide details of a charge for the payment
            initiation.
          required:
            - ChargeBearer
            - Type
            - Amount
          properties:
            ChargeBearer:
              $ref: ./OBInternalChargeBearerType1Code.yaml
            Type:
              $ref: ./OBInternalPaymentChargeType1Code.yaml
            Amount:
              $ref: ./OBActiveOrHistoricCurrencyAndAmount.yaml
      Initiation:
        type: object
        additionalProperties: false
        required:
          - InstructionIdentification
          - RequestedExecutionDateTime
          - InstructedAmount
          - CreditorAccount
        description: >-
          The Initiation payload is sent by the initiating party to the ASPSP.
          It is used to request movement of funds from the debtor account to a
          creditor for a single scheduled domestic payment.
        properties:
          InstructionIdentification:
            description: >-
              Unique identification as assigned by an instructing party for an
              instructed party to unambiguously identify the instruction.

              Usage: the  instruction identification is a point to point
              reference that can be used between the instructing party and the
              instructed party to refer to the individual instruction. It can be
              included in several messages related to the instruction.
            type: string
            minLength: 1
            maxLength: 35
          EndToEndIdentification:
            description: >-
              Unique identification assigned by the initiating party to
              unambiguously identify the transaction. This identification is
              passed on, unchanged, throughout the entire end-to-end chain.

              Usage: The end-to-end identification can be used for
              reconciliation or to link tasks relating to the transaction. It
              can be included in several messages related to the transaction.

              OB: The Faster Payments Scheme can only access 31 characters for
              the EndToEndIdentification field.
            type: string
            minLength: 1
            maxLength: 35
          LocalInstrument:
            $ref: ./OBInternalLocalInstrument1Code.yaml
          RequestedExecutionDateTime:
            description: >-
              Date at which the initiating party requests the clearing agent to
              process the payment. 

              Usage: This is the date on which the debtor's account is to be
              debited.All dates in the JSON payloads are represented in ISO 8601
              date-time format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
          InstructedAmount:
            type: object
            additionalProperties: false
            required:
              - Amount
              - Currency
            description: >-
              Amount of money to be moved between the debtor and creditor,
              before deduction of charges, expressed in the currency as ordered
              by the initiating party.

              Usage: This amount has to be transported unchanged through the
              transaction chain.
            properties:
              Amount:
                $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
              Currency:
                $ref: ./ActiveOrHistoricCurrencyCode.yaml
          DebtorAccount:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
            description: >-
              Unambiguous identification of the account of the debtor to which a
              debit entry will be made as a result of the transaction.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  The account name is the name or names of the account owner(s)
                  represented at an account level, as displayed by the ASPSP's
                  online channels.

                  Note, the account name is not the product name or the nickname
                  of the account.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
          CreditorAccount:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
              - Name
            description: >-
              Unambiguous identification of the account of the creditor to which
              a credit entry will be posted as a result of the payment
              transaction.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  The account name is the name or names of the account owner(s)
                  represented at an account level.

                  Note, the account name is not the product name or the nickname
                  of the account.

                  OB: ASPSPs may carry out name validation for Confirmation of
                  Payee, but it is not mandatory.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
          CreditorPostalAddress:
            $ref: ./OBPostalAddress7.yaml
          UltimateCreditor:
            $ref: ./OBUltimateCreditor1.yaml
          UltimateDebtor:
            $ref: ./OBUltimateDebtor1.yaml
          RegulatoryReporting:
            type: array
            items:
              $ref: ./OBRegulatoryReporting1.yaml
            maxItems: 10
          RemittanceInformation:
            $ref: ./OBRemittanceInformation2.yaml
          SupplementaryData:
            $ref: ./OBSupplementaryData1.yaml
      MultiAuthorisation:
        type: object
        additionalProperties: false
        required:
          - Status
        description: The multiple authorisation flow response from the ASPSP.
        properties:
          Status:
            description: Specifies the status of the authorisation flow in code form.
            type: string
            enum:
              - AUTH
              - AWAU
              - RJCT
          NumberRequired:
            description: >-
              Number of authorisations required for payment order (total
              required at the start of the multi authorisation journey).
            type: integer
          NumberReceived:
            description: Number of authorisations received.
            type: integer
          LastUpdateDateTime:
            description: >-
              Last date and time at the authorisation flow was updated.All dates
              in the JSON payloads are represented in ISO 8601 date-time
              format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
          ExpirationDateTime:
            description: >-
              Date and time at which the requested authorisation flow must be
              completed.All dates in the JSON payloads are represented in ISO
              8601 date-time format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
      Debtor:
        $ref: ./OBCashAccountDebtor4.yaml
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
