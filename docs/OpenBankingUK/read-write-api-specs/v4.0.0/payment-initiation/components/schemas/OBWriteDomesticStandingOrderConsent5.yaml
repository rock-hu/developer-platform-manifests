type: object
additionalProperties: false
required:
  - Data
  - Risk
properties:
  Data:
    type: object
    additionalProperties: false
    required:
      - Permission
      - Initiation
    properties:
      Permission:
        description: Specifies the Open Banking service request types.
        type: string
        enum:
          - Create
      ReadRefundAccount:
        description: Specifies to share the refund account details with PISP
        type: string
        enum:
          - 'No'
          - 'Yes'
      Initiation:
        type: object
        additionalProperties: false
        required:
          - FirstPaymentDateTime
          - FirstPaymentAmount
          - CreditorAccount
        description: >-
          The Initiation payload is sent by the initiating party to the ASPSP.
          It is used to request movement of funds from the debtor account to a
          creditor for a domestic standing order.
        properties:
          RemittanceInformation:
            $ref: ./OBRemittanceInformation2.yaml
          FirstPaymentAmount:
            type: object
            additionalProperties: false
            required:
              - Amount
              - Currency
            description: The amount of the first Standing Order
            properties:
              Amount:
                $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
              Currency:
                $ref: ./ActiveOrHistoricCurrencyCode.yaml
          RecurringPaymentAmount:
            type: object
            additionalProperties: false
            required:
              - Amount
              - Currency
            description: The amount of the recurring Standing Order
            properties:
              Amount:
                $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
              Currency:
                $ref: ./ActiveOrHistoricCurrencyCode.yaml
          FinalPaymentAmount:
            type: object
            additionalProperties: false
            required:
              - Amount
              - Currency
            description: The amount of the final Standing Order
            properties:
              Amount:
                $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
              Currency:
                $ref: ./ActiveOrHistoricCurrencyCode.yaml
          DebtorAccount:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
            description: Provides the details to identify the debtor account.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  The account name is the name or names of the account owner(s)
                  represented at an account level, as displayed by the ASPSP's
                  online channels.

                  Note, the account name is not the product name or the nickname
                  of the account.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
          CreditorAccount:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
              - Name
            description: >-
              Identification assigned by an institution to identify an account.
              This identification is known by the account owner.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  The account name is the name or names of the account owner(s)
                  represented at an account level.

                  Note, the account name is not the product name or the nickname
                  of the account.

                  OB: ASPSPs may carry out name validation for Confirmation of
                  Payee, but it is not mandatory.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
          UltimateCreditor:
            $ref: ./OBUltimateCreditor1.yaml
          UltimateDebtor:
            $ref: ./OBUltimateDebtor1.yaml
          RegulatoryReporting:
            type: array
            items:
              $ref: ./OBRegulatoryReporting1.yaml
            maxItems: 10
          MandateRelatedInformation:
            $ref: ./OBMandateRelatedInformation1.yaml
          SupplementaryData:
            $ref: ./OBSupplementaryData1.yaml
      Authorisation:
        type: object
        additionalProperties: false
        required:
          - AuthorisationType
        description: The authorisation type request from the TPP.
        properties:
          AuthorisationType:
            description: Type of authorisation flow requested.
            type: string
            enum:
              - Any
              - Single
          CompletionDateTime:
            description: >-
              Date and time at which the requested authorisation flow must be
              completed.All dates in the JSON payloads are represented in ISO
              8601 date-time format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
      SCASupportData:
        $ref: ./OBSCASupportData1.yaml
  Risk:
    $ref: ./OBRisk1.yaml
