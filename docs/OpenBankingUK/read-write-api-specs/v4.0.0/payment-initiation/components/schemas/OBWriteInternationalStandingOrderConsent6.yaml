type: object
additionalProperties: false
required:
  - Data
  - Risk
properties:
  Data:
    type: object
    additionalProperties: false
    required:
      - Permission
      - Initiation
    properties:
      Permission:
        description: Specifies the Open Banking service request types.
        type: string
        enum:
          - Create
      ReadRefundAccount:
        description: Specifies to share the refund account details with PISP
        type: string
        enum:
          - 'No'
          - 'Yes'
      Initiation:
        type: object
        additionalProperties: false
        required:
          - CurrencyOfTransfer
          - InstructedAmount
          - CreditorAccount
        description: >-
          The Initiation payload is sent by the initiating party to the ASPSP.
          It is used to request movement of funds from the debtor account to a
          creditor for an international standing order.
        properties:
          RemittanceInformation:
            $ref: ./OBRemittanceInformation2.yaml
          Purpose:
            description: >-
              Specifies the external purpose code in the format of character
              string with a maximum length of 4 characters.

              The list of valid codes is an external code list published
              separately.

              External code sets can be downloaded from www.iso20022.org.
            type: string
            minLength: 1
            maxLength: 4
          ExtendedPurpose:
            description: >-
              Specifies the purpose of an international payment, when there is
              no corresponding 4 character code available in the ISO20022 list
              of Purpose Codes.
            type: string
            minLength: 1
            maxLength: 140
          ChargeBearer:
            $ref: ./OBInternalChargeBearerType1Code.yaml
          CurrencyOfTransfer:
            description: >-
              Specifies the currency of the to be transferred amount, which is
              different from the currency of the debtor's account.
            type: string
            pattern: ^[A-Z]{3,3}$
          DestinationCountryCode:
            description: >-
              Country in which Credit Account is domiciled. Code to identify a
              country, a dependency, or another area of particular geopolitical
              interest, on the basis of country names obtained from the United
              Nations (ISO 3166, Alpha-2 code).
            type: string
            pattern: '[A-Z]{2,2}'
          InstructedAmount:
            type: object
            additionalProperties: false
            required:
              - Amount
              - Currency
            description: >-
              Amount of money to be moved between the debtor and creditor,
              before deduction of charges, expressed in the currency as ordered
              by the initiating party.

              Usage: This amount has to be transported unchanged through the
              transaction chain.
            properties:
              Amount:
                $ref: ./OBActiveCurrencyAndAmount_SimpleType.yaml
              Currency:
                $ref: ./ActiveOrHistoricCurrencyCode.yaml
          DebtorAccount:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
            description: Provides the details to identify the debtor account.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  The account name is the name or names of the account owner(s)
                  represented at an account level, as displayed by the ASPSP's
                  online channels.

                  Note, the account name is not the product name or the nickname
                  of the account.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
          Creditor:
            type: object
            additionalProperties: false
            description: Party to which an amount of money is due.
            properties:
              Name:
                description: >-
                  Name by which a party is known and which is usually used to
                  identify that party.
                type: string
                minLength: 1
                maxLength: 350
              LEI:
                $ref: ./LEI.yaml
              PostalAddress:
                $ref: ./OBPostalAddress7.yaml
          CreditorAgent:
            type: object
            additionalProperties: false
            description: >-
              Party that manages the account on behalf of the account owner,
              that is manages the registration and booking of entries on the
              account, calculates balances on the account and provides
              information about the account.

              This is the servicer of the beneficiary account.
            properties:
              SchemeName:
                $ref: ./OBInternalFinancialInstitutionIdentification4Code.yaml
              Identification:
                description: >-
                  Unique and unambiguous identification of the servicing
                  institution.
                type: string
                minLength: 1
                maxLength: 35
              Name:
                $ref: ./Name.yaml
              LEI:
                $ref: ./LEI.yaml
              PostalAddress:
                $ref: ./OBPostalAddress7.yaml
          CreditorAccount:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
              - Name
            description: Provides the details to identify the beneficiary account.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  The account name is the name or names of the account owner(s)
                  represented at an account level.

                  Note, the account name is not the product name or the nickname
                  of the account.

                  OB: ASPSPs may carry out name validation for Confirmation of
                  Payee, but it is not mandatory.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
          UltimateCreditor:
            $ref: ./OBUltimateCreditor1.yaml
          UltimateDebtor:
            $ref: ./OBUltimateDebtor1.yaml
          RegulatoryReporting:
            type: array
            items:
              $ref: ./OBRegulatoryReporting1.yaml
            maxItems: 10
          MandateRelatedInformation:
            $ref: ./OBMandateRelatedInformation1.yaml
          SupplementaryData:
            $ref: ./OBSupplementaryData1.yaml
      Authorisation:
        type: object
        additionalProperties: false
        required:
          - AuthorisationType
        description: The authorisation type request from the TPP.
        properties:
          AuthorisationType:
            description: Type of authorisation flow requested.
            type: string
            enum:
              - Any
              - Single
          CompletionDateTime:
            description: >-
              Date and time at which the requested authorisation flow must be
              completed.All dates in the JSON payloads are represented in ISO
              8601 date-time format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
      SCASupportData:
        $ref: ./OBSCASupportData1.yaml
  Risk:
    $ref: ./OBRisk1.yaml
