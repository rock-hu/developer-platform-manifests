type: object
additionalProperties: false
required:
  - Data
properties:
  Data:
    type: object
    additionalProperties: false
    required:
      - FilePaymentId
      - ConsentId
      - CreationDateTime
      - Status
      - StatusUpdateDateTime
      - Initiation
    properties:
      FilePaymentId:
        description: >-
          OB: Unique identification as assigned by the ASPSP to uniquely
          identify the file payment resource.
        type: string
        minLength: 1
        maxLength: 40
      ConsentId:
        description: >-
          OB: Unique identification as assigned by the ASPSP to uniquely
          identify the consent resource.
        type: string
        minLength: 1
        maxLength: 128
      CreationDateTime:
        description: >-
          Date and time at which the message was created.All dates in the JSON
          payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      Status:
        description: Specifies the status of the payment order resource.
        type: string
        enum:
          - RCVD
          - RJCT
          - ASCP
      StatusUpdateDateTime:
        description: >-
          Date and time at which the resource status was updated.All dates in
          the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      StatusReason:
        type: array
        items:
          $ref: ./OBStatusReason.yaml
      Charges:
        type: array
        items:
          type: object
          additionalProperties: false
          description: >-
            Set of elements used to provide details of a charge for the payment
            initiation.
          required:
            - ChargeBearer
            - Type
            - Amount
          properties:
            ChargeBearer:
              $ref: ./OBInternalChargeBearerType1Code.yaml
            Type:
              $ref: ./OBInternalPaymentChargeType1Code.yaml
            Amount:
              $ref: ./OBActiveOrHistoricCurrencyAndAmount.yaml
      Initiation:
        type: object
        additionalProperties: false
        required:
          - FileType
          - FileHash
        description: >-
          The Initiation payload is sent by the initiating party to the ASPSP.
          It is used to request movement of funds using a payment file.
        properties:
          FileType:
            description: Specifies the payment file type.
            type: string
            x-namespaced-enum:
              - UK.OBIE.PaymentInitiation.3.1
              - UK.OBIE.pain.001.001.08
          FileHash:
            description: A base64 encoding of a SHA256 hash of the file to be uploaded.
            type: string
            minLength: 1
            maxLength: 44
          FileReference:
            description: Reference for the file.
            type: string
            minLength: 1
            maxLength: 40
          NumberOfTransactions:
            description: >-
              Number of individual transactions contained in the payment
              information group.
            type: string
            pattern: '[0-9]{1,15}'
          ControlSum:
            description: >-
              Total of all individual amounts included in the group,
              irrespective of currencies.
            type: number
          RequestedExecutionDateTime:
            description: >-
              Date at which the initiating party requests the clearing agent to
              process the payment. 

              Usage: This is the date on which the debtor's account is to be
              debited.All dates in the JSON payloads are represented in ISO 8601
              date-time format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
          LocalInstrument:
            $ref: ./OBInternalLocalInstrument1Code.yaml
          DebtorAccount:
            type: object
            additionalProperties: false
            required:
              - SchemeName
              - Identification
            description: >-
              Unambiguous identification of the account of the debtor to which a
              debit entry will be made as a result of the transaction.
            properties:
              SchemeName:
                $ref: ./OBInternalAccountIdentification4Code.yaml
              Identification:
                $ref: ./Identification_0.yaml
              Name:
                description: >-
                  The account name is the name or names of the account owner(s)
                  represented at an account level, as displayed by the ASPSP's
                  online channels.

                  Note, the account name is not the product name or the nickname
                  of the account.
                type: string
                minLength: 1
                maxLength: 350
              SecondaryIdentification:
                $ref: ./SecondaryIdentification.yaml
              Proxy:
                $ref: ./OBProxy1.yaml
          CreditorAgent:
            type: object
            additionalProperties: false
            description: Financial institution servicing an account for the creditor.
            properties:
              SchemeName:
                $ref: ./OBInternalFinancialInstitutionIdentification4Code.yaml
              Identification:
                $ref: ./Identification_1.yaml
              Name:
                $ref: ./Name.yaml
              LEI:
                $ref: ./LEI.yaml
              PostalAddress:
                $ref: ./OBPostalAddress7.yaml
          UltimateDebtor:
            $ref: ./OBUltimateDebtor1.yaml
          RemittanceInformation:
            $ref: ./OBRemittanceInformation2.yaml
          SupplementaryData:
            $ref: ./OBSupplementaryData1.yaml
      MultiAuthorisation:
        type: object
        additionalProperties: false
        required:
          - Status
        description: The multiple authorisation flow response from the ASPSP.
        properties:
          Status:
            description: Specifies the status of the authorisation flow in code form.
            type: string
            enum:
              - AUTH
              - AWAU
              - RJCT
          NumberRequired:
            description: >-
              Number of authorisations required for payment order (total
              required at the start of the multi authorisation journey).
            type: integer
          NumberReceived:
            description: Number of authorisations received.
            type: integer
          LastUpdateDateTime:
            description: >-
              Last date and time at the authorisation flow was updated.All dates
              in the JSON payloads are represented in ISO 8601 date-time
              format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
          ExpirationDateTime:
            description: >-
              Date and time at which the requested authorisation flow must be
              completed.All dates in the JSON payloads are represented in ISO
              8601 date-time format. 

              All date-time fields in responses must include the timezone. An
              example is below:

              2017-04-05T10:43:07+00:00
            type: string
            format: date-time
      Debtor:
        $ref: ./OBCashAccountDebtor4.yaml
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
