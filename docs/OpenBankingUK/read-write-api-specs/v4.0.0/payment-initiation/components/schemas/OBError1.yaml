type: object
properties:
  ErrorCode:
    $ref: ./OBInternalErrorResponseError1Code.yaml
  Message:
    description: >-
      A description of the error that occurred. e.g., 'A mandatory field isn't
      supplied' or 'RequestedExecutionDateTime must be in future'

      OBL doesn't standardise this field
    type: string
    minLength: 1
    maxLength: 500
  Path:
    description: >-
      Recommended but optional reference to the JSON Path of the field with
      error, e.g., Data.Initiation.InstructedAmount.Currency
    type: string
    minLength: 1
    maxLength: 500
  Url:
    description: >-
      URL to help remediate the problem, or provide more information, or to API
      Reference, or help etc
    type: string
required:
  - ErrorCode
additionalProperties: false
minProperties: 1
