type: object
required:
  - Frequency
properties:
  MandateIdentification:
    $ref: ./Identification_1.yaml
  Classification:
    $ref: ./OBExternalMandateClassification1Code.yaml
  CategoryPurposeCode:
    $ref: ./ExternalCategoryPurpose1Code.yaml
  FirstPaymentDateTime:
    type: string
    format: date-time
  RecurringPaymentDateTime:
    description: >-
      The date on which the first recurring payment for a Standing Order
      schedule will be made. 

      Usage: This must be populated only if the first recurring date is
      different to the first payment date.All dates in the JSON payloads are
      represented in ISO 8601 date-time format. 

      All date-time fields in responses must include the timezone. An example is
      below:

      2017-04-05T10:43:07+00:00
    type: string
    format: date-time
  FinalPaymentDateTime:
    type: string
    format: date-time
  Frequency:
    $ref: ./OBFrequency6.yaml
  Reason:
    description: >-
      Reason for the direct debit mandate to allow the user to distinguish
      between different mandates for the same creditor.
    type: string
    maxLength: 256
    minLength: 1
