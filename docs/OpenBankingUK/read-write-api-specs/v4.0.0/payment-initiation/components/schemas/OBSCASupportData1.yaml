type: object
properties:
  RequestedSCAExemptionType:
    type: string
    description: >-
      This field allows a PISP to request specific SCA Exemption for a Payment
      Initiation
    enum:
      - BillPayment
      - ContactlessTravel
      - EcommerceGoods
      - EcommerceServices
      - Kiosk
      - Parking
      - PartyToParty
  AppliedAuthenticationApproach:
    type: string
    maxLength: 40
    description: >-
      Specifies a character string with a maximum length of 40 characters.

      Usage: This field indicates whether the PSU was subject to SCA performed
      by the TPP
    enum:
      - CA
      - SCA
  ReferencePaymentOrderId:
    type: string
    maxLength: 40
    minLength: 1
    description: >-
      If the payment is recurring, then this field is populated with the
      transaction identifier of the previous payment occurrence so that the
      ASPSP can verify that the PISP, amount and the payee are the same as the
      previous occurrence. The value here refers to the payment id e.g.
      DomesticPaymentId  
description: Supporting Data provided by TPP, when requesting SCA Exemption.
