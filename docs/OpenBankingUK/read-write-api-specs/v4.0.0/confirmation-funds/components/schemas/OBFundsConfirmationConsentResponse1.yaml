type: object
required:
  - Data
properties:
  Data:
    type: object
    required:
      - ConsentId
      - CreationDateTime
      - Status
      - StatusUpdateDateTime
      - DebtorAccount
    properties:
      ConsentId:
        description: >-
          Unique identification as assigned to identify the funds confirmation
          consent resource.
        type: string
        minLength: 1
        maxLength: 128
      CreationDateTime:
        description: >-
          Date and time at which the resource was created.All dates in the JSON
          payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      Status:
        description: Specifies the status of consent resource in code form.
        type: string
        enum:
          - AWAU
          - RJCT
          - AUTH
      StatusReason:
        type: array
        items:
          $ref: ./OBStatusReason.yaml
      StatusUpdateDateTime:
        description: >-
          Date and time at which the resource status was updated.All dates in
          the JSON payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      ExpirationDateTime:
        description: >-
          Specified date and time the funds confirmation authorisation will
          expire.

          If this is not populated, the authorisation will be open ended.All
          dates in the JSON payloads are represented in ISO 8601 date-time
          format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      DebtorAccount:
        type: object
        required:
          - SchemeName
          - Identification
        description: >-
          Unambiguous identification of the account of the debtor to which a
          confirmation of funds consent will be applied.
        properties:
          SchemeName:
            description: >-
              Name of the identification scheme, in a coded form as published in
              an external list.
            type: string
            x-namespaced-enum:
              - UK.OBIE.BBAN
              - UK.OBIE.IBAN
              - UK.OBIE.PAN
              - UK.OBIE.Paym
              - UK.OBIE.SortCodeAccountNumber
              - UK.OBIE.Wallet
          Identification:
            description: >-
              Identification assigned by an institution to identify an account.
              This identification is known by the account owner.
            type: string
            minLength: 1
            maxLength: 256
          Name:
            description: >-
              Name of the account, as assigned by the account servicing
              institution.

              Usage: The account name is the name or names of the account
              owner(s) represented at an account level. The account name is not
              the product name or the nickname of the account.
            type: string
            minLength: 1
            maxLength: 350
          SecondaryIdentification:
            description: >-
              This is secondary identification of the account, as assigned by
              the account servicing institution. 

              This can be used by building societies to additionally identify
              accounts with a roll number (in addition to a sort code and
              account number combination).
            type: string
            minLength: 1
            maxLength: 34
          Proxy:
            $ref: ./OBProxy1.yaml
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
additionalProperties: false
