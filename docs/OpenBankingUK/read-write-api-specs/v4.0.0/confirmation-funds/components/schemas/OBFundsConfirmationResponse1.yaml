type: object
required:
  - Data
properties:
  Data:
    type: object
    required:
      - FundsConfirmationId
      - ConsentId
      - CreationDateTime
      - FundsAvailable
      - Reference
      - InstructedAmount
    properties:
      FundsConfirmationId:
        description: >-
          Unique identification as assigned by the ASPSP to uniquely identify
          the funds confirmation resource.
        type: string
        minLength: 1
        maxLength: 40
      ConsentId:
        description: >-
          Unique identification as assigned by the ASPSP to uniquely identify
          the funds confirmation consent resource.
        type: string
        minLength: 1
        maxLength: 128
      CreationDateTime:
        description: >-
          Date and time at which the resource was created.All dates in the JSON
          payloads are represented in ISO 8601 date-time format. 

          All date-time fields in responses must include the timezone. An
          example is below:

          2017-04-05T10:43:07+00:00
        type: string
        format: date-time
      FundsAvailable:
        description: Flag to indicate the result of a confirmation of funds check.
        type: boolean
      Reference:
        description: >-
          Unique reference, as assigned by the CBPII, to unambiguously refer to
          the request related to the payment transaction.
        type: string
        minLength: 1
        maxLength: 35
      InstructedAmount:
        type: object
        required:
          - Amount
          - Currency
        description: >-
          Amount of money to be confirmed as available funds in the debtor
          account. Contains an Amount and a Currency.
        properties:
          Amount:
            description: >-
              A number of monetary units specified in an active currency where
              the unit of currency is explicit and compliant with ISO 4217.
            type: string
            pattern: ^\d{1,13}$|^\d{1,13}\.\d{1,5}$
          Currency:
            description: >-
              A code allocated to a currency by a Maintenance Agency under an
              international identification scheme, as described in the latest
              edition of the international standard ISO 4217 "Codes for the
              representation of currencies and funds".
            type: string
            pattern: ^[A-Z]{3,3}$
  Links:
    $ref: ./Links.yaml
  Meta:
    $ref: ./Meta.yaml
additionalProperties: false
